name: phantom_messenger
description: Private messenger — no phone number, no server, no metadata.
version: 0.1.0+1

publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Identidad / BIP39 ──────────────────────────────────────────────────────
  bip39: ^1.0.6
  ed25519_hd_key: ^2.2.1
  bs58check: ^1.0.2

  # ── Criptografía ───────────────────────────────────────────────────────────
  cryptography: ^2.9.0

  # ── Storage local cifrado ──────────────────────────────────────────────────
  # Hive con serialización JSON manual — no necesitamos hive_generator
  # ni build_runner (tienen conflicto de analyzer con el SDK actual).
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Transporte BLE ─────────────────────────────────────────────────────────
  flutter_blue_plus: ^2.2.1

  # ── Conectividad (internet vs BLE fallback) ────────────────────────────────
  connectivity_plus: ^7.1.1

  # ── Permisos runtime (BT, localización) ───────────────────────────────────
  permission_handler: ^12.0.1

  # ── HTTP (IPFS API) ────────────────────────────────────────────────────────
  http: ^1.2.1

  # ── Path provider (storage path en mobile/desktop) ─────────────────────────
  path_provider: ^2.1.3

  # ── Secure storage (seed phrase persistence) ───────────────────────────────
  flutter_secure_storage: ^10.0.0

  # ── Utilidades ─────────────────────────────────────────────────────────────
  uuid: ^4.3.3
  convert: ^3.1.1
  meta: ^1.12.0
  post_quantum: ^1.0.0-prerelease.8

dependency_overrides:
  post_quantum:
    path: local_packages/post_quantum

dev_dependencies:
  # flutter_test ya provee expect/test/group.
  # No usamos package:test (conflicto de analyzer con el SDK).
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
