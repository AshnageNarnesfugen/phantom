name: phantom_messenger
description: Private messenger — no phone number, no server, no metadata.
version: 0.1.0+1

publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Identity / BIP39 ───────────────────────────────────────────────────────
  bip39: ^1.0.6
  ed25519_hd_key: ^2.2.1
  bs58check: ^1.0.2

  # ── Cryptography ───────────────────────────────────────────────────────────
  cryptography: ^2.9.0

  # ── Encrypted local storage ────────────────────────────────────────────────
  # Hive with manual JSON serialization — hive_generator and build_runner
  # are not needed (they conflict with the current analyzer version).
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── BLE transport ──────────────────────────────────────────────────────────
  flutter_blue_plus: ^2.2.1

  # ── Connectivity (internet vs BLE fallback) ────────────────────────────────
  connectivity_plus: ^7.1.1

  # ── Runtime permissions (BT, location) ────────────────────────────────────
  permission_handler: ^12.0.1

  # ── HTTP (IPFS API) ────────────────────────────────────────────────────────
  http: ^1.2.1

  # ── Path provider (storage path on mobile/desktop) ─────────────────────────
  path_provider: ^2.1.3

  # ── Secure storage (seed phrase persistence) ───────────────────────────────
  flutter_secure_storage: ^10.0.0

  # ── Utilities ──────────────────────────────────────────────────────────────
  uuid: ^4.3.3
  convert: ^3.1.1
  meta: ^1.12.0
  post_quantum: ^1.0.0-prerelease.8

  # ── Update service ─────────────────────────────────────────────────────────
  package_info_plus: ^8.1.3
  open_file: ^3.3.2

  # ── Local notifications ────────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ── Image picker (wallpaper + avatar) ──────────────────────────────────────
  image_picker: ^1.1.2

  # ── Media / file / audio ───────────────────────────────────────────────────
  file_picker: ^8.1.6
  record: ^6.2.0
  audioplayers: ^6.1.0
  gal: ^1.2.0

dependency_overrides:
  post_quantum:
    path: local_packages/post_quantum

dev_dependencies:
  # flutter_test already provides expect/test/group.
  # package:test is not used (conflicts with the analyzer version).
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
