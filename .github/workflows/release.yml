name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Sign APK with apksigner
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
          SIGNING_CERTIFICATE: ${{ secrets.SIGNING_CERTIFICATE }}
        run: |
          # Diagnose secret availability (shows length, never content)
          echo "SIGNING_PRIVATE_KEY length: ${#SIGNING_PRIVATE_KEY}"
          echo "SIGNING_CERTIFICATE length: ${#SIGNING_CERTIFICATE}"
          if [ -z "$SIGNING_PRIVATE_KEY" ]; then
            echo "ERROR: SIGNING_PRIVATE_KEY secret is not set"; exit 1
          fi

          # Secrets stored as base64 to avoid newline encoding issues
          echo "$SIGNING_PRIVATE_KEY" | base64 --decode > /tmp/signing-key-raw.pem
          echo "$SIGNING_CERTIFICATE" | base64 --decode > /tmp/signing-cert.pem

          # apksigner requires PKCS#8 format; convert from PKCS#1 if needed
          openssl pkcs8 -topk8 -nocrypt \
            -in /tmp/signing-key-raw.pem \
            -out /tmp/signing-key.pem

          # Use older build-tools apksigner (34.x) — 37.x has ML-DSA regression
          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name "apksigner" -type f | sort -V | grep -v "35\|36\|37" | tail -1)
          if [ -z "$APKSIGNER" ]; then
            APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name "apksigner" -type f | sort -V | tail -1)
          fi
          echo "Using apksigner: $APKSIGNER"

          "$APKSIGNER" sign \
            --key /tmp/signing-key.pem \
            --cert /tmp/signing-cert.pem \
            build/app/outputs/flutter-apk/app-release.apk

          rm -f /tmp/signing-key-raw.pem /tmp/signing-key.pem /tmp/signing-cert.pem

      - name: Rename APK with commit SHA
        id: apk
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '\n')
          APK_NAME="phantom-${VERSION}-${SHORT_SHA}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${APK_NAME}
          echo "name=${APK_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "Phantom ${{ steps.apk.outputs.name }}"
          body: |
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Message:** ${{ github.event.head_commit.message }}

            > Automated build. Install by enabling "Install from unknown sources" on your device.
          files: build/app/outputs/flutter-apk/${{ steps.apk.outputs.name }}
          prerelease: true
