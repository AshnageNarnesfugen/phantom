name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Sign APK with apksigner
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
          SIGNING_CERTIFICATE: ${{ secrets.SIGNING_CERTIFICATE }}
        run: |
          # Decode base64 secrets
          echo "$SIGNING_PRIVATE_KEY" | base64 --decode > /tmp/signing-key-raw.pem
          echo "$SIGNING_CERTIFICATE" | base64 --decode > /tmp/signing-cert.pem

          # Convert to PKCS#1 then to PKCS#8 DER (compatible with apksigner 34.x)
          openssl rsa -in /tmp/signing-key-raw.pem -out /tmp/signing-key-rsa.pem 2>/dev/null
          openssl pkcs8 -topk8 -nocrypt -outform DER \
            -in /tmp/signing-key-rsa.pem \
            -out /tmp/signing-key.der

          # Use apksigner 34.x — newer versions have regressions with RSA keys
          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name "apksigner" -type f | sort -V | grep -v "35\|36\|37" | tail -1)
          [ -z "$APKSIGNER" ] && APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name "apksigner" -type f | sort -V | tail -1)

          "$APKSIGNER" sign \
            --key /tmp/signing-key.der \
            --cert /tmp/signing-cert.pem \
            build/app/outputs/flutter-apk/app-release.apk

          rm -f /tmp/signing-key-raw.pem /tmp/signing-key-rsa.pem /tmp/signing-key.der /tmp/signing-cert.pem

      - name: Rename APK with commit SHA
        id: apk
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '\n')
          APK_NAME="phantom-${VERSION}-${SHORT_SHA}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${APK_NAME}
          echo "name=${APK_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "Phantom ${{ steps.apk.outputs.name }}"
          body: |
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Message:** ${{ github.event.head_commit.message }}

            > Automated build. Install by enabling "Install from unknown sources" on your device.
          files: build/app/outputs/flutter-apk/${{ steps.apk.outputs.name }}
          prerelease: true
