name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Sign APK with apksigner
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
          SIGNING_CERTIFICATE: ${{ secrets.SIGNING_CERTIFICATE }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "$SIGNING_PRIVATE_KEY" > /tmp/signing-key.pem
          echo "$SIGNING_CERTIFICATE" > /tmp/signing-cert.pem

          openssl pkcs12 -export \
            -legacy \
            -in /tmp/signing-cert.pem \
            -inkey /tmp/signing-key.pem \
            -out /tmp/phantom-release.p12 \
            -name "phantom" \
            -passout "pass:$SIGNING_KEY_PASSWORD"

          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name "apksigner" -type f | sort -V | tail -1)

          "$APKSIGNER" sign \
            --ks /tmp/phantom-release.p12 \
            --ks-pass "pass:$SIGNING_KEY_PASSWORD" \
            --ks-key-alias "phantom" \
            --key-pass "pass:$SIGNING_KEY_PASSWORD" \
            build/app/outputs/flutter-apk/app-release.apk

          rm -f /tmp/signing-key.pem /tmp/signing-cert.pem /tmp/phantom-release.p12

      - name: Rename APK with commit SHA
        id: apk
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '\n')
          APK_NAME="phantom-${VERSION}-${SHORT_SHA}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${APK_NAME}
          echo "name=${APK_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "Phantom ${{ steps.apk.outputs.name }}"
          body: |
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Message:** ${{ github.event.head_commit.message }}

            > Automated build. Install by enabling "Install from unknown sources" on your device.
          files: build/app/outputs/flutter-apk/${{ steps.apk.outputs.name }}
          prerelease: true
