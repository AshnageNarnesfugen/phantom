name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        # Pinned to a specific stable version so the libflutter.so embedded
        # in our APK can't drift past what we've tested. `cache: false` to
        # force a fresh extraction every run — caches that get corrupted
        # mid-update silently ship an APK with a libflutter.so whose JNI
        # signatures don't match the Dart entry, which crashes at attach
        # time on the first launch.
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.32.0'
          cache: false

      - name: Log Flutter version
        run: |
          flutter --version
          echo "---"
          which flutter
          ls -la $(dirname $(which flutter))/../

      - name: Set up Go (for static x86_64 Kubo build)
        uses: actions/setup-go@v5
        with:
          # Pinned to 1.22 so gomobile + yggdrasil-go contrib/mobile don't
          # silently upgrade to a Go version that pulls in a broken x/mobile.
          go-version: '1.22.6'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build yggdrasil-go mobile.aar (gomobile)
        # Optional: gomobile + yggdrasil-go has been brittle on recent
        # x/mobile snapshots (bind layout breakages). When this step fails
        # the rest of the build still runs — the Kotlin VpnService loads
        # mobile.Yggdrasil via reflection so the absent .aar simply means
        # Yggdrasil features stay dormant. Logging + reset session etc. ship.
        continue-on-error: true
        run: |
          export ANDROID_NDK_HOME=$(ls -d "$ANDROID_HOME/ndk/"*/ 2>/dev/null | sort -V | tail -1 || true)
          export ANDROID_NDK_HOME=${ANDROID_NDK_HOME%/}
          if [ -z "$ANDROID_NDK_HOME" ]; then
            sdkmanager --install "ndk;26.3.11579264"
            export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/26.3.11579264"
          fi
          echo "Using NDK: $ANDROID_NDK_HOME"
          mkdir -p android/app/libs
          bash scripts/build_yggdrasil_mobile.sh android/app/libs/yggdrasil-mobile.aar

      - name: Download arm64 Kubo binary
        # DIAG: temporarily disabled. The local flutter run --release build
        # has no libkubo.so in jniLibs and boots cleanly; the CI APK does
        # include it and crashes at startup before Dart runs. Skip the
        # binary to confirm libkubo.so is the trigger.
        if: false
        run: bash scripts/download_kubo.sh arm64-v8a

      - name: Bundle i2pd binaries (PurpleI2P)
        # Non-blocking: when the script can't fetch the upstream APKs (asset
        # names changed, release moved, network hiccup) the rest of the build
        # still succeeds. The Dart-side I2pdDaemon logs the missing binary and
        # I2PTransport gracefully falls back to IPFS for handshakes.
        continue-on-error: true
        run: bash scripts/download_i2pd.sh arm64-v8a x86_64

      - name: Build static x86_64 Kubo binary
        # DIAG: temporarily disabled — see "Download arm64 Kubo binary".
        if: false
        run: |
          git clone --depth=1 --branch v0.41.0 \
            https://github.com/ipfs/kubo.git /tmp/kubo
          cd /tmp/kubo && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -o /tmp/ipfs ./cmd/ipfs
          cp /tmp/ipfs "$GITHUB_WORKSPACE/android/app/src/main/jniLibs/x86_64/libkubo.so"
          echo "✓ Static x86_64 kubo: $(du -sh android/app/src/main/jniLibs/x86_64/libkubo.so | cut -f1)"

      - name: Prepare signing keystore for gradle
        # DIAG: generate a fresh self-signed debug-style keystore on the
        # runner instead of using the production cert. Local flutter run
        # --release works with debug.keystore; if this APK boots cleanly
        # the bug is in the production cert (format / fields / expiry).
        # If it still crashes the bug is in some other CI-vs-local delta.
        run: |
          KEYSTORE_PASS="phantom-ci-$(date +%s)"
          keytool -genkeypair \
            -alias phantom-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -storetype PKCS12 \
            -keystore android/app/phantom-release.p12 \
            -storepass "${KEYSTORE_PASS}" \
            -keypass "${KEYSTORE_PASS}" \
            -dname "CN=Phantom CI Diagnostic, OU=Phantom, O=Phantom, L=CI, ST=CI, C=US"
          cat > android/key.properties <<EOF
          storeFile=phantom-release.p12
          storePassword=${KEYSTORE_PASS}
          keyAlias=phantom-release
          keyPassword=${KEYSTORE_PASS}
          EOF

      - name: Build release APK
        # Diagnostic build: dropped --obfuscate and isMinifyEnabled in gradle.
        # If this APK runs cleanly we know the original release crash was in
        # the R8/obfuscation pipeline. Re-enable both once isolated.
        run: |
          flutter build apk --release

      - name: Rename APK with commit SHA
        id: apk
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '\n')
          APK_NAME="phantom-${VERSION}-${SHORT_SHA}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${APK_NAME}
          echo "name=${APK_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "Phantom ${{ steps.apk.outputs.name }}"
          body: |
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Message:** ${{ github.event.head_commit.message }}

            > Automated build. Install by enabling "Install from unknown sources" on your device.
          files: build/app/outputs/flutter-apk/${{ steps.apk.outputs.name }}
          prerelease: true
