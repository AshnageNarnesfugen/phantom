name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        # Pinned to 3.41.9 — the same version the user runs locally where
        # `flutter run --release` boots cleanly on the Snapdragon 865 /
        # Android 13 device that the CI 3.44.0 APK kept crashing on
        # (libflutter.so null deref inside FlutterJNI.performNativeAttach,
        # see tombstone in commit f9480ad message). Bumping past 3.41.9
        # requires re-testing on that hardware first.
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: false

      - name: Log Flutter version
        run: |
          flutter --version
          echo "---"
          which flutter
          ls -la $(dirname $(which flutter))/../

      - name: Set up Go (for static x86_64 Kubo build)
        uses: actions/setup-go@v5
        with:
          # Pinned to 1.22 so gomobile + yggdrasil-go contrib/mobile don't
          # silently upgrade to a Go version that pulls in a broken x/mobile.
          go-version: '1.22.6'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build yggdrasil-go mobile.aar (gomobile)
        # Optional: gomobile + yggdrasil-go has been brittle on recent
        # x/mobile snapshots (bind layout breakages). When this step fails
        # the rest of the build still runs — the Kotlin VpnService loads
        # mobile.Yggdrasil via reflection so the absent .aar simply means
        # Yggdrasil features stay dormant. Logging + reset session etc. ship.
        continue-on-error: true
        run: |
          export ANDROID_NDK_HOME=$(ls -d "$ANDROID_HOME/ndk/"*/ 2>/dev/null | sort -V | tail -1 || true)
          export ANDROID_NDK_HOME=${ANDROID_NDK_HOME%/}
          if [ -z "$ANDROID_NDK_HOME" ]; then
            sdkmanager --install "ndk;26.3.11579264"
            export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/26.3.11579264"
          fi
          echo "Using NDK: $ANDROID_NDK_HOME"
          mkdir -p android/app/libs
          bash scripts/build_yggdrasil_mobile.sh android/app/libs/yggdrasil-mobile.aar

      - name: Download arm64 Kubo binary
        run: bash scripts/download_kubo.sh arm64-v8a

      - name: Bundle i2pd binaries (PurpleI2P)
        # Non-blocking: when the script can't fetch the upstream APKs (asset
        # names changed, release moved, network hiccup) the rest of the build
        # still succeeds. The Dart-side I2pdDaemon logs the missing binary and
        # I2PTransport gracefully falls back to IPFS for handshakes.
        continue-on-error: true
        run: bash scripts/download_i2pd.sh arm64-v8a x86_64

      - name: Build go-waku daemon (arm64 PIE → libgowaku.so)
        # Waku handles all real-time messaging + store-and-forward for offline
        # delivery. IPFS is relegated to file transfer only. The script builds
        # go-waku's cmd/waku CLI as a PIE executable named libgowaku.so and
        # drops it directly into jniLibs/arm64-v8a so the APK ships a runnable
        # daemon (same pattern as i2pd / kubo).
        # Non-blocking: if the upstream repo or the cross-build breaks, the
        # APK still ships — Waku stays dormant and the app falls back to IPFS
        # pubsub for messaging until libgowaku.so is present.
        continue-on-error: true
        run: |
          export ANDROID_NDK_HOME=$(ls -d "$ANDROID_HOME/ndk/"*/ 2>/dev/null | sort -V | tail -1 || true)
          export ANDROID_NDK_HOME=${ANDROID_NDK_HOME%/}
          if [ -z "$ANDROID_NDK_HOME" ]; then
            sdkmanager --install "ndk;26.3.11579264"
            export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/26.3.11579264"
          fi
          echo "Using NDK: $ANDROID_NDK_HOME"
          bash scripts/build_waku_mobile.sh android/app/src/main/jniLibs

      - name: Verify libgowaku.so bundled
        # Surface whether Waku actually made it into the build for each ABI.
        # Doesn't fail the job (Waku is optional) but the log line tells us
        # at a glance whether messaging will run on Waku or fall back to IPFS
        # — and on which device classes (arm64 phones vs x86_64 Waydroid /
        # emulator).
        run: |
          for ABI in arm64-v8a x86_64; do
            SO="android/app/src/main/jniLibs/$ABI/libgowaku.so"
            if [ -f "$SO" ]; then
              echo "✓ libgowaku.so [$ABI] present ($(du -h "$SO" | cut -f1))"
              file "$SO" || true
            else
              echo "⚠ libgowaku.so [$ABI] NOT built — Waku disabled on $ABI devices"
            fi
          done

      - name: Build static x86_64 Kubo binary
        run: |
          git clone --depth=1 --branch v0.41.0 \
            https://github.com/ipfs/kubo.git /tmp/kubo
          cd /tmp/kubo && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -o /tmp/ipfs ./cmd/ipfs
          cp /tmp/ipfs "$GITHUB_WORKSPACE/android/app/src/main/jniLibs/x86_64/libkubo.so"
          echo "✓ Static x86_64 kubo: $(du -sh android/app/src/main/jniLibs/x86_64/libkubo.so | cut -f1)"

      - name: Prepare signing keystore for gradle
        # Build a PKCS12 keystore from the PEM secrets and write a
        # key.properties that AGP reads via android/app/build.gradle.kts.
        # Doing this BEFORE `flutter build apk` makes gradle sign the APK
        # once with the production key — the old workflow signed twice
        # (debug.keystore at build then apksigner with prod cert) which
        # left residual signature blocks that crashed the loader on some
        # Android versions.
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
          SIGNING_CERTIFICATE: ${{ secrets.SIGNING_CERTIFICATE }}
        run: |
          echo "$SIGNING_PRIVATE_KEY" | base64 --decode > /tmp/signing-key-raw.pem
          echo "$SIGNING_CERTIFICATE" | base64 --decode > /tmp/signing-cert.pem
          openssl pkcs8 -topk8 -nocrypt \
            -in /tmp/signing-key-raw.pem \
            -out /tmp/signing-key-pkcs8.pem
          KEYSTORE_PASS="phantom-ci-$(date +%s)"
          openssl pkcs12 -export \
            -inkey /tmp/signing-key-pkcs8.pem \
            -in /tmp/signing-cert.pem \
            -out android/app/phantom-release.p12 \
            -name phantom-release \
            -password "pass:${KEYSTORE_PASS}"
          cat > android/key.properties <<EOF
          storeFile=phantom-release.p12
          storePassword=${KEYSTORE_PASS}
          keyAlias=phantom-release
          keyPassword=${KEYSTORE_PASS}
          EOF
          rm -f /tmp/signing-key-raw.pem /tmp/signing-key-pkcs8.pem /tmp/signing-cert.pem

      - name: Build release APK
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Rename APK with commit SHA
        id: apk
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '\n')
          APK_NAME="phantom-${VERSION}-${SHORT_SHA}.apk"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${APK_NAME}
          echo "name=${APK_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "Phantom ${{ steps.apk.outputs.name }}"
          body: |
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Message:** ${{ github.event.head_commit.message }}

            > Automated build. Install by enabling "Install from unknown sources" on your device.
          files: build/app/outputs/flutter-apk/${{ steps.apk.outputs.name }}
          prerelease: true
